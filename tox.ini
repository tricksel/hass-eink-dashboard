[tox]
env_list = lint, format, typecheck, test, interrogate
#toxworkdir = {env:HOME}/.tox/eink-dashboard

[testenv]
base_python = python3

[testenv:lint]
skip_install = true
deps = ruff>=0.11
commands =
    ruff check .

[testenv:format]
skip_install = true
deps = ruff>=0.11
commands =
    ruff format --check .

[testenv:typecheck]
skip_install = true
deps =
    Pillow>=12.2.0
    aiohttp>=3.0
    ty
commands =
    ty check

[testenv:test]
skip_install = true
deps =
    Pillow>=12.2.0
    aiohttp>=3.0
    pytest>=8.0
    pytest-asyncio>=1.0
    voluptuous>=0.14
commands =
    pytest {posargs}

[testenv:docs-coverage]
skip_install = true
deps = interrogate
commands =
    interrogate custom_components/eink_dashboard/

[testenv:interrogate]
skip_install = true
deps = interrogate
commands =
    interrogate -vv custom_components/eink_dashboard/
